services:
  db:
    image: postgres:16
    container_name: ai-border-triage-db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  backend:
    build: ./services/backend
    container_name: ai-border-triage-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - db

  ai-service:
    build: ./services/ai-service
    container_name: ai-border-triage-ai-service
    env_file:
      - .env
    ports:
      - "${AI_SERVICE_PORT:-8100}:8100"
    depends_on:
      - db

volumes:
  pg_data:
